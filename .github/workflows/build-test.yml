name: CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Check if dist/index.js needs to be rebuilt
        run: diff <(git status dist/index.js --short) <(echo -n "")

      - run: npm run format-check

      - run: npm run lint

      - run: npm test

  runSdkManager:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - ${{ matrix.cmdline-tools-version }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-15
          - macos-14
          - windows-2025
          - windows-2022
        cmdline-tools-version:
          - 12266719
          - 11479570
          - 11076708
          - 10406996
          - 9862592
          - 9477386
          - 9123335
          - 8512546
          - 6858069
          - 6609375
          - 6200805
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Resolve ANDROID_SDK_ROOT
        id: sdk
        shell: bash
        run: echo "root=${ANDROID_SDK_ROOT:-$HOME/.android/sdk}" >> "$GITHUB_OUTPUT"

      - name: Cache cmdline-tools
        uses: actions/cache@v4
        with:
          path: ${{ steps.sdk.outputs.root }}/cmdline-tools
          key: cmdline-tools-${{ runner.os }}-${{ matrix.cmdline-tools-version }}

      - name: Run setup-android
        uses: ./
        with:
          cmdline-tools-version: ${{ matrix.cmdline-tools-version }}
          log-accepted-android-sdk-licenses: 'false'

      - run: sdkmanager --list

  CI:
    if: always()
    needs: [checks, runSdkManager]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
