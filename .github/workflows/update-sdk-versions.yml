name: Update SDK Versions

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.PREMEX_POT_APP_ID }}
          private-key: ${{ secrets.PREMEX_POT_APP_SECRET }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check for new SDK versions
        id: check
        run: node scripts/update-sdk-versions.mjs

      - name: Build
        if: steps.check.outputs.has_updates == 'true'
        run: npm run build

      - name: Create PR
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="update-sdk-versions-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add src/main.ts dist/index.js .github/workflows/build-test.yml action.yml README.md
          git commit -m "$(cat <<'EOF'
          Add support for cmdline-tools ${{ steps.check.outputs.summary }}

          Auto-detected from https://dl.google.com/android/repository/repository2-3.xml
          EOF
          )"
          git push -u origin "$branch"
          gh pr create \
            --title "Add support for cmdline-tools ${{ steps.check.outputs.summary }}" \
            --body "$(cat <<'EOF'
          ## Summary
          New stable Android SDK cmdline-tools versions detected: ${{ steps.check.outputs.summary }}

          Default version updated to ${{ steps.check.outputs.latest_version }} (build ${{ steps.check.outputs.latest_build }}).

          Auto-generated from [repository2-3.xml](https://dl.google.com/android/repository/repository2-3.xml).

          ## Test plan
          - [ ] CI passes for all new versions across all platforms
          EOF
          )"
